<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Hat 설문 데이터 입력</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #CC0000;
    --red-dark: #A00000;
    --red-light: #FFEEEE;
    --gray: #f5f5f5;
    --border: #ddd;
    --text: #333;
    --text-light: #666;
  }
  body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; color: var(--text); background: #eee; height: 100vh; overflow: hidden; }

  /* Header */
  .header {
    height: 56px; background: var(--red); display: flex; align-items: center;
    justify-content: space-between; padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header h1 { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .header-logo { color: #fff; font-size: 20px; font-weight: 800; border: 2px solid #fff; padding: 2px 8px; border-radius: 3px; }
  .btn-export {
    background: #fff; color: var(--red); border: none; padding: 8px 18px;
    border-radius: 5px; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn-export:hover { background: #f0f0f0; }
  .btn-export:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Main layout */
  .main { display: flex; height: calc(100vh - 56px); margin-top: 56px; }

  /* PDF Panel */
  .pdf-panel {
    width: 50%; border-right: 2px solid var(--border); background: #555;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .pdf-toolbar {
    background: #333; padding: 8px 12px; display: flex; align-items: center;
    gap: 10px; flex-shrink: 0;
  }
  .pdf-toolbar label {
    background: var(--red); color: #fff; padding: 6px 14px; border-radius: 4px;
    cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap;
    transition: background 0.15s;
  }
  .pdf-toolbar label:hover { background: var(--red-dark); }
  #pdf-file-input { display: none; }
  .pdf-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .pdf-nav button {
    background: #555; color: #fff; border: 1px solid #777; padding: 5px 10px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .pdf-nav button:hover { background: #666; }
  .pdf-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-info { color: #ccc; font-size: 12px; white-space: nowrap; }
  .pdf-viewer { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 16px; }
  .pdf-viewer img { max-width: 100%; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .pdf-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: #aaa; gap: 12px; text-align: center;
  }
  .pdf-placeholder svg { opacity: 0.4; }
  .pdf-placeholder p { font-size: 14px; }

  /* Form Panel */
  .form-panel { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; }

  /* Respondent tabs */
  .tabs-bar {
    background: var(--gray); border-bottom: 1px solid var(--border);
    padding: 8px 12px 0; display: flex; align-items: flex-end; gap: 4px; flex-wrap: nowrap;
    overflow-x: auto; flex-shrink: 0;
  }
  .tab {
    padding: 6px 14px; border-radius: 6px 6px 0 0; border: 1px solid var(--border);
    border-bottom: none; background: #e8e8e8; cursor: pointer; font-size: 12px;
    white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: background 0.1s;
    color: var(--text-light);
  }
  .tab:hover { background: #d8d8d8; }
  .tab.active { background: #fff; color: var(--text); font-weight: 600; }
  .tab .tab-del { color: #aaa; font-size: 14px; line-height: 1; margin-left: 2px; }
  .tab .tab-del:hover { color: var(--red); }
  .btn-add-tab {
    padding: 6px 12px; border-radius: 6px 6px 0 0; border: 1px dashed #bbb; border-bottom: none;
    background: transparent; cursor: pointer; font-size: 18px; color: #aaa; line-height: 1;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-add-tab:hover { color: var(--red); border-color: var(--red); }

  /* Form body */
  .form-body { flex: 1; overflow-y: auto; padding: 20px; }

  .empty-state {
    height: 100%; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: #bbb; gap: 10px; text-align: center;
  }
  .empty-state p { font-size: 14px; }

  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--red); margin-bottom: 10px; padding-bottom: 5px;
    border-bottom: 2px solid var(--red-light);
  }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .field-full { grid-column: 1 / -1; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--text-light); }
  .field input, .field textarea, .field select {
    border: 1px solid var(--border); border-radius: 4px; padding: 7px 10px;
    font-size: 13px; color: var(--text); outline: none; font-family: inherit;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--red); }
  .field textarea { resize: vertical; min-height: 60px; }

  .radio-group, .check-group { display: flex; flex-direction: column; gap: 6px; }
  .radio-group.horizontal, .check-group.horizontal { flex-direction: row; flex-wrap: wrap; gap: 8px; }
  .radio-option, .check-option {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border);
    transition: background 0.1s, border-color 0.1s;
  }
  .radio-option:hover, .check-option:hover { background: var(--red-light); border-color: #ffaaaa; }
  .radio-option input, .check-option input { accent-color: var(--red); }
  .radio-option.selected, .check-option.selected { background: var(--red-light); border-color: var(--red); }
  .radio-option span, .check-option span { font-size: 12px; line-height: 1.4; }

  .consent-group { display: flex; gap: 10px; }
  .consent-btn {
    flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 6px;
    cursor: pointer; text-align: center; font-size: 14px; font-weight: 700;
    transition: all 0.15s; background: #fff;
  }
  .consent-btn.o:hover, .consent-btn.o.active { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
  .consent-btn.x:hover, .consent-btn.x.active { background: #ffeee; border-color: var(--red); color: var(--red); }

  .q-label {
    font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px;
    padding: 8px 12px; background: var(--gray); border-radius: 4px; border-left: 3px solid var(--red);
    line-height: 1.5;
  }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
    display: flex; align-items: center; justify-content: center; display: none;
  }
  .loading-box {
    background: #fff; border-radius: 10px; padding: 30px 40px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .spinner {
    width: 36px; height: 36px; border: 4px solid #eee; border-top-color: var(--red);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 13px;
    opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 300; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: #2e7d32; }
  .toast.error { background: var(--red); }

  .no-pdf-note {
    font-size: 11px; color: #aaa; margin-left: 8px;
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="header-logo">RedHat</span>
    <h1>고객 설문 데이터 입력 시스템</h1>
  </div>
  <button class="btn-export" id="btn-export" onclick="exportExcel()" disabled>
    <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
      <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
      <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/>
    </svg>
    엑셀 내보내기
  </button>
</header>

<div class="main">
  <!-- PDF Panel -->
  <div class="pdf-panel">
    <div class="pdf-toolbar">
      <label for="pdf-file-input">
        <svg width="13" height="13" fill="currentColor" viewBox="0 0 16 16" style="margin-right:4px;vertical-align:-2px">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
          <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 0-.708-.708z"/>
        </svg>
        PDF 업로드
      </label>
      <input type="file" id="pdf-file-input" accept=".pdf" onchange="uploadPDF(this)">
      <span class="no-pdf-note" id="pdf-filename">파일을 선택해주세요</span>
      <div class="pdf-nav" id="pdf-nav" style="display:none">
        <button onclick="changePage(-1)" id="btn-prev">◀</button>
        <span class="page-info" id="page-info">1 / 1</span>
        <button onclick="changePage(1)" id="btn-next">▶</button>
      </div>
    </div>
    <div class="pdf-viewer" id="pdf-viewer">
      <div class="pdf-placeholder">
        <svg width="60" height="60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>PDF 파일을 업로드하면<br>여기에 표시됩니다</p>
      </div>
    </div>
  </div>

  <!-- Form Panel -->
  <div class="form-panel">
    <div class="tabs-bar" id="tabs-bar">
      <button class="btn-add-tab" onclick="addRespondent()" title="응답자 추가">+</button>
    </div>
    <div class="form-body" id="form-body">
      <div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" opacity="0.3">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/>
        </svg>
        <p>상단 <strong>+</strong> 버튼을 눌러<br>응답자를 추가하세요</p>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="loading-box">
    <div class="spinner"></div>
    <p id="loading-text">PDF 처리 중...</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const Q1_OPTIONS = ['매우 적절했다', '대체로 적절했다', '다소 기초적이었다', '다소 어려웠다'];
const Q2_OPTIONS = ['예', '아니오'];
const Q3_OPTIONS = [
  '추가 자료를 보기 원합니다.',
  '제품 전시 및 비용을 안내받기를 원합니다.',
  '대면 세션을 원합니다.',
  '제품 관련 영업 담당을 원합니다.',
  '교육 상담 및 인증을 원합니다.',
  '아직 잘 모르겠습니다.',
];
const Q4_OPTIONS = [
  '클라우드 아키텍처 (하이브리드, 퍼블릭, 프라이빗 클라우드)',
  'AI 솔루션',
  'IT 자동화',
  '컨테이너 / 쿠버네티스 플랫폼',
  '리눅스 OS',
  '마이크로서비스 (클라우드 네이티브/App 개발)',
  '보안',
  '혼합 (레거시/프런트엔드, 데이터, 프로세스)',
  '교육 및 자격증',
];

let pdfPages = [];
let currentPage = 0;
let respondents = [];
let currentRespondent = -1;

// ─── PDF ───────────────────────────────────────────────
async function uploadPDF(input) {
  const file = input.files[0];
  if (!file) return;

  document.getElementById('pdf-filename').textContent = file.name;
  showLoading('PDF 처리 중...');

  const formData = new FormData();
  formData.append('pdf', file);

  try {
    const res = await fetch('/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    pdfPages = data.pages;
    currentPage = 0;
    renderPage(0);
    document.getElementById('pdf-nav').style.display = 'flex';
    showToast(`PDF ${data.total}뎘이지 로드 완료`, 'success');
  } catch (e) {
    showToast('PDF 처리 실패: ' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

function renderPage(idx) {
  if (!pdfPages.length) return;
  currentPage = idx;
  const viewer = document.getElementById('pdf-viewer');
  viewer.innerHTML = `<img src="${pdfPages[idx].image}" alt="페이지 ${idx+1}">`;
  document.getElementById('page-info').textContent = `${idx+1} / ${pdfPages.length}`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === pdfPages.length - 1;
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next >= 0 && next < pdfPages.length) renderPage(next);
}

// ─── Respondents ─────────────────────────────────────
function newRespondent(no) {
  return { no, lastName:'', firstName:'', company:'', department:'', jobRole:'', q1:'', q1_1:'', q2:'', q3:'', q4:[], consent:'' };
}

function addRespondent() {
  const no = respondents.length + 1;
  respondents.push(newRespondent(no));
  currentRespondent = respondents.length - 1;
  renderTabs();
  renderForm();
  document.getElementById('btn-export').disabled = false;

  // PDF 해당 페이지로 이동
  if (pdfPages.length >= no) renderPage(no - 1);
}

function selectRespondent(idx) {
  saveCurrentForm();
  currentRespondent = idx;
  renderTabs();
  renderForm();
  if (pdfPages.length > idx) renderPage(idx);
}

function deleteRespondent(idx, e) {
  e.stopPropagation();
  if (!confirm(`응답자 ${idx+1}번을 삭제하시겠습니까?`)) return;
  respondents.splice(idx, 1);
  // No. 재정렬
  respondents.forEach((r, i) => r.no = i + 1);
  currentRespondent = Math.min(currentRespondent, respondents.length - 1);
  if (respondents.length === 0) {
    currentRespondent = -1;
    document.getElementById('btn-export').disabled = true;
  }
  renderTabs();
  renderForm();
}

function saveCurrentForm() {
  if (currentRespondent < 0) return;
  const r = respondents[currentRespondent];
  const f = (id) => document.getElementById(id);
  if (!f('f-lastName')) return;

  r.lastName = f('f-lastName').value;
  r.firstName = f('f-firstName').value;
  r.company = f('f-company').value;
  r.department = f('f-department').value;
  r.jobRole = f('f-jobRole').value;
  r.q1_1 = f('f-q1_1').value;

  r.q1 = document.querySelector('input[name="q1"]:checked')?.value || '';
  r.q2 = document.querySelector('input[name="q2"]:checked')?.value || '';
  r.q3 = document.querySelector('input[name="q3"]:checked')?.value || '';
  r.q4 = Array.from(document.querySelectorAll('input[name="q4"]:checked')).map(c => c.value);
  r.consent = document.querySelector('input[name="consent"]:checked')?.value || '';

  // 탭 이름 업데이트
  renderTabs();
}

// ─── Render ──────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  respondents.forEach((r, i) => {
    const name = (r.lastName || r.firstName) ? `${r.lastName}${r.firstName}` : `응답자 ${i+1}`;
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === currentRespondent ? ' active' : '');
    tab.onclick = () => selectRespondent(i);
    tab.innerHTML = `No.${r.no} ${name}<span class="tab-del" onclick="deleteRespondent(${i}, event)">×</span>`;
    bar.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-tab';
  addBtn.textContent = '+';
  addBtn.title = '응답자 추가';
  addBtn.onclick = addRespondent;
  bar.appendChild(addBtn);
}

function renderForm() {
  const body = document.getElementById('form-body');
  if (currentRespondent < 0) {
    body.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" opacity="0.3">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/>
      </svg>
      <p>상단 <strong>+</strong> 버튼을 눌러<br>응답자를 추가하세요</p>
    </div>`;
    return;
  }

  const r = respondents[currentRespondent];

  body.innerHTML = `
  <div class="section">
    <div class="section-title">기본 정보</div>
    <div class="field-grid three">
      <div class="field">
        <label>No.</label>
        <input type="text" value="${r.no}" readonly style="background:#f9f9f9;color:#aaa">
      </div>
      <div class="field">
        <label>성 (Last Name)</label>
        <input type="text" id="f-lastName" value="${r.lastName}" placeholder="박" oninput="autoSave()">
      </div>
      <div class="field">
        <label>이름 (First Name)</label>
        <input type="text" id="f-firstName" value="${r.firstName}" placeholder="규민" oninput="autoSave()">
      </div>
    </div>
    <div class="field-grid" style="margin-top:10px">
      <div class="field">
        <label>회사명 (Company)</label>
        <input type="text" id="f-company" value="${r.company}" placeholder="기아엔" oninput="autoSave()">
      </div>
      <div class="field">
        <label>부서 (Department)</label>
        <input type="text" id="f-department" value="${r.department}" placeholder="Site Infra Engineering" oninput="autoSave()">
      </div>
      <div class="field field-full">
        <label>직함 (Job Role)</label>
        <input type="text" id="f-jobRole" value="${r.jobRole}" placeholder="Manager" oninput="autoSave()">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="q-label">1. 오늘 세션에서 다룬 내용의 깊이와 범위는 어떠셨습니까?</div>
    <div class="radio-group horizontal">
      ${Q1_OPTIONS.map(opt => `
        <label class="radio-option ${r.q1===opt?'selected':''}">
          <input type="radio" name="q1" value="${opt}" ${r.q1===opt?'checked':''} onchange="autoSave()">
          <span>${opt}</span>
        </label>`).join('')}
    </div>
  </div>

  <div class="section">
    <div class="q-label">1-1. 세미나 진행 관련, 제안사항이나 의견을 자유롭게 작성해 주세요.</div>
    <div class="field">
      <textarea id="f-q1_1" placeholder="(선택 사항)" oninput="autoSave()">${r.q1_1}</textarea>
    </div>
  </div>

  <div class="section">
    <div class="q-label">2. 금일 세미나에서 소개된 Red Hat 솔루션에 대해 추가 안내 받기를 원하십니까?</div>
    <div class="radio-group horizontal">
      ${Q2_OPTIONS.map(opt => `
        <label class="radio-option ${r.q2===opt?'selected':''}">
          <input type="radio" name="q2" value="${opt}" ${r.q2===opt?'checked':''} onchange="autoSave()">
          <span>${opt}</span>
        </label>`).join('')}
    </div>
  </div>

  <div class="section">
    <div class="q-label">3. 원하시는 상담 유형을 선택해 주세요.</div>
    <div class="radio-group">
      ${Q3_OPTIONS.map(opt => `
        <label class="radio-option ${r.q3===opt?'selected':''}">
          <input type="radio" name="q3" value="${opt}" ${r.q3===opt?'checked':''} onchange="autoSave()">
          <span>${opt}</span>
        </label>`).join('')}
    </div>
  </div>

  <div class="section">
    <div class="q-label">4. Red Hat 세션에서 듣고 싶으신 다른 주제가 있으시다면 선택해 주세요. <span style="font-weight:400;color:#888">(중복 선택 가능)</span></div>
    <div class="check-group">
      ${Q4_OPTIONS.map(opt => `
        <label class="check-option ${r.q4.includes(opt)?'selected':''}">
          <input type="checkbox" name="q4" value="${opt}" ${r.q4.includes(opt)?'checked':''} onchange="autoSave()">
          <span>${opt}</span>
        </label>`).join('')}
    </div>
  </div>

  <div class="section">
    <div class="q-label">정보 제공 동의</div>
    <div class="consent-group">
      <label class="radio-option ${r.consent==='O'?'selected':''}" style="flex:1;justify-content:center">
        <input type="radio" name="consent" value="O" ${r.consent==='O'?'checked':''} onchange="autoSave()">
        <span style="font-size:15px;font-weight:700">O &nbsp; 동의합니다</span>
      </label>
      <label class="radio-option ${r.consent==='X'?'selected':''}" style="flex:1;justify-content:center">
        <input type="radio" name="consent" value="X" ${r.consent==='X'?'checked':''} onchange="autoSave()">
        <span style="font-size:15px;font-weight:700">X &nbsp; 동의하지 않습니다</span>
      </label>
    </div>
  </div>
  `;

  // radio/checkbox 선택 시 시각적 활성화
  document.querySelectorAll('.radio-option input, .check-option input').forEach(input => {
    input.addEventListener('change', () => {
      if (input.type === 'radio') {
        document.querySelectorAll(`.radio-option input[name="${input.name}"]`).forEach(r => {
          r.closest('.radio-option').classList.toggle('selected', r.checked);
        });
      } else {
        input.closest('.check-option').classList.toggle('selected', input.checked);
      }
    });
  });
}

let saveTimer = null;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { saveCurrentForm(); }, 200);
}

// ─── Export ──────────────────────────────────────────
async function exportExcel() {
  saveCurrentForm();
  if (!respondents.length) { showToast('응답자 데이터가 없습니다.', 'error'); return; }

  showLoading('엑셀 파일 생성 중...');
  try {
    const res = await fetch('/export', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ respondents })
    });
    if (!res.ok) throw new Error('서버 오류');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'redhat_survey.xlsx';
    a.click();
    URL.revokeObjectURL(url);
    showToast('엑셀 파일 다운로드 완료!', 'success');
  } catch(e) {
    showToast('내보내기 실패: ' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

// ─── UI Helpers ──────────────────────────────────────
function showLoading(msg='처리 중...') {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => { el.className = 'toast'; }, 3000);
}
</script>
